<!DOCTYPE html>
<html>
<head>
<title>AGUGCAI Admin</title>
<style>
body {
    font-family: Arial;
    background: #020617;
    color: white;
    padding: 20px;
}

.card {
    background: #111827;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
}
button {
    padding: 8px 12px;
    margin-top: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>AGUGCAI Admin Panel</h1>

<h3>Pending Users</h3>

<div id="users"></div>

<script>
function loadUsers() {
    let users = JSON.parse(localStorage.getItem("users")) || [];
    let container = document.getElementById("users");

    container.innerHTML = "";

    users.forEach((user, index) => {
        container.innerHTML += `
            <div class="card">
                <p><b>Name:</b> ${user.name}</p>
                <p><b>Email:</b> ${user.email}</p>
                <p><b>Status:</b> ${user.status}</p>

                <button onclick="approve(${index})">Approve</button>
            </div>
        `;
    });
}

function approve(index) {
    let users = JSON.parse(localStorage.getItem("users")) || [];

    users[index].status = "approved";

    localStorage.setItem("users", JSON.stringify(users));

    loadUsers();
}

loadUsers();
</script>

</body>
  </html>
